realsense_pipeline:
  color:
    width:  1280
    height: 720
    fps:    30

  depth:
    width:          1280
    height:         720
    fps:            30
    align_to_color: true

    # spatial_filter section is optional. If absent, the filter is disabled.
    spatial_filter:
      # Number of filter passes (1 ~ 5).
      magnitude:    2
      # Spatial weight for neighboring pixels (0.0 ~ 1.0).
      # Higher values give neighbors more influence.
      smooth_alpha: 0.5
      # Depth difference tolerance in mm.
      # Higher values allow smoothing across larger depth discontinuities.
      smooth_delta: 20.0
